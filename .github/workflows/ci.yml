name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

# One in-flight run per ref; a newer push cancels the older run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  daemon:
    name: daemon (typecheck + unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: daemon/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Typecheck (tsc --noEmit)
        run: pnpm check

      - name: Unit tests
        run: pnpm test
        # The integration suite runs in its own `integration` job below (it needs
        # a systemd podman relay + several minutes to build the image), keeping
        # this job the fast hermetic check.

      - name: Production artifact (plain Node 24 runtime)
        run: pnpm test:artifact

  frontend:
    name: frontend (typecheck + Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Typecheck (svelte-check)
        run: pnpm check

      - name: Install Playwright browser (chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright tests
        # playwright.config.ts's webServer builds the SPA and serves it; the
        # suite drives the app against mocked API fixtures (no daemon needed).
        run: pnpm test

  integration:
    name: daemon integration (podman chatmail relay)
    runs-on: ubuntu-latest
    # The suite builds a real chatmail relay image (clone + apt + venv) and boots
    # it as a systemd podman container, so give it room.
    timeout-minutes: 40
    defaults:
      run:
        working-directory: daemon
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: daemon/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Podman preflight (version + systemd-in-container smoke)
        run: |
          set -euxo pipefail
          podman version
          # Confirm this runner can run systemd as PID 1 in a container at all,
          # so a failure here is a clear "substrate" signal vs. a relay-build bug.
          podman run --rm --systemd=always quay.io/podman/stable:latest \
            /bin/sh -c 'command -v systemctl' || \
            echo "::warning::systemd-in-container smoke failed; the relay may not boot"

      - name: Build the relay image
        run: bash testenv/relay.sh build

      - name: Integration tests
        run: pnpm test:integration
